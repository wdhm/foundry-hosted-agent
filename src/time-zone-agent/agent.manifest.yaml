# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: time-zone-agent
displayName: "Time Zone Agent"

description: >
  A timezone assistant that tells the current date and time in any timezone.
  Uses a local C# function tool with Microsoft Agent Framework.

metadata:
  tags:
    - AI Agent Hosting
    - Responses Protocol
    - Agent Framework
    - Local Tools
    - .NET

template:
  name: time-zone-agent
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  resources:
    cpu: "0.25"
    memory: 0.5Gi
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
parameters:
  properties: []
resources:
  - kind: model
    id: gpt-5.1
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
