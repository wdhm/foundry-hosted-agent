# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.27-preview'
name: foundry-hosted-agent
services:
    time-zone-agent:
        project: ./src/time-zone-agent
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.25"
                    memory: 0.5Gi
        agent:
            manifest: ./src/time-zone-agent/agent.yaml
infra:
    provider: bicep
    path: ./infra
